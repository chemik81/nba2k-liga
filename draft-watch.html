<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 NBA 2K Liga — Draft Live</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f5c518;
  --gold2: #c9a012;
  --dark: #0a0c10;
  --dark2: #10131a;
  --dark3: #161922;
  --dark4: #1d2130;
  --border: rgba(245,197,24,0.15);
  --text: #e8eaf0;
  --muted: #6b7080;
  --green: #4ade80;
  --red: #f87171;
  --orange: #fb923c;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--dark); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

/* ── TOP BAR ── */
.topbar {
  background: var(--dark2);
  border-bottom: 2px solid var(--gold);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: .05em;
}
.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 1.4s infinite;
  flex-shrink: 0;
}
.status-txt { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }

/* ── OTC BAR ── */
.otc-bar {
  background: linear-gradient(135deg, var(--dark2), var(--dark3));
  border: 2px solid var(--gold);
  border-radius: var(--radius);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 24px rgba(245,197,24,.08);
}
.otc-logo {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--dark4);
  border: 2px solid rgba(245,197,24,.3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 22px; color: var(--gold);
  flex-shrink: 0; overflow: hidden;
}
.otc-logo img { width: 100%; height: 100%; object-fit: cover; }
.otc-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
.otc-team { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; color: var(--gold); line-height: 1; }
.otc-pick { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* ── TIMER ── */
.timer-wrap { margin-left: auto; text-align: center; }
.timer-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.timer-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  min-width: 100px;
  text-align: center;
  transition: color .3s;
}
.timer-val.urgent { color: var(--red); animation: urgentPulse .5s infinite alternate; }
.timer-val.warning { color: var(--orange); }

/* ── LAST PICK BADGE ── */
.last-pick-badge {
  background: rgba(74,222,128,.08);
  border: 1px solid rgba(74,222,128,.25);
  border-radius: var(--radius);
  padding: 8px 14px;
  font-size: 13px;
  min-width: 160px;
}
.last-pick-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.last-pick-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; color: var(--green); }
.last-pick-team { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── DRAFT BOARD ── */
.board-grid {
  display: grid;
  gap: 10px;
}
.team-col {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .3s, box-shadow .3s;
}
.team-col.otc {
  border-color: var(--gold);
  box-shadow: 0 0 16px rgba(245,197,24,.2);
}
.team-col-header {
  background: var(--dark3);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.team-logo-sm {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--dark4);
  border: 1.5px solid rgba(245,197,24,.2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 14px; color: var(--gold);
  flex-shrink: 0; overflow: hidden;
}
.team-logo-sm img { width: 100%; height: 100%; object-fit: cover; }
.team-col-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px; font-weight: 900;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.team-col-gm { font-size: 11px; color: var(--muted); }
.otc-badge {
  margin-left: auto;
  background: rgba(245,197,24,.15);
  color: var(--gold);
  border: 1px solid rgba(245,197,24,.3);
  border-radius: 4px;
  padding: 2px 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 11px; letter-spacing: .05em;
  flex-shrink: 0;
}

/* ── PICK SLOTS ── */
.pick-slot {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  min-height: 38px;
}
.pick-slot:last-child { border-bottom: none; }
.pick-slot.empty { opacity: .45; }
.pos-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  min-width: 36px;
  text-align: center;
  flex-shrink: 0;
}
.pos-pg, .pos-sg { background: rgba(96,165,250,.15); color: #93c5fd; }
.pos-sf, .pos-lck { background: rgba(196,181,253,.15); color: #c4b5fd; }
.pos-pf { background: rgba(196,181,253,.15); color: #c4b5fd; }
.pos-c  { background: rgba(134,239,172,.15); color: #86efac; }
.pos-flex { background: rgba(255,255,255,.08); color: var(--muted); }
.pick-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700;
  flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pick-num { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.pick-positions { font-size: 10px; color: var(--gold); font-weight: 700; flex-shrink: 0; }

/* ── RECENT PICKS TICKER ── */
.ticker-bar {
  background: var(--dark2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 6px 0;
  overflow: hidden;
  white-space: nowrap;
  margin-bottom: 20px;
}
.ticker-inner { display: inline-block; animation: ticker 40s linear infinite; padding-left: 100%; }
.ticker-item {
  display: inline-block;
  margin: 0 28px;
  font-size: 13px;
  font-weight: 600;
}
.ticker-item .pick-n { color: var(--muted); font-size: 11px; }
.ticker-item .pick-player { color: var(--text); }
.ticker-item .pick-team { color: var(--gold); }

/* ── DONE STATE ── */
.done-banner {
  text-align: center;
  padding: 3rem 2rem;
  background: var(--dark2);
  border: 2px solid var(--gold);
  border-radius: var(--radius);
  margin-bottom: 20px;
}
.done-banner h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 2px;
}

/* ── LAYOUT ── */
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* ── ANIMATIONS ── */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes urgentPulse { from{opacity:1} to{opacity:.5} }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
.new-pick { animation: slideIn .4s ease; }

/* ── WAITING STATE ── */
.waiting {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 1rem;
}
.waiting h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; color: var(--muted); }

/* ── RESPONSIVE ── */
@media(max-width:768px) {
  .board-grid { grid-template-columns: 1fr 1fr !important; }
  .otc-bar { flex-wrap: wrap; }
  .timer-val { font-size: 36px; }
}
@media(max-width:480px) {
  .board-grid { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="live-dot" id="live-dot"></div>
  <div class="topbar-title" id="draft-title">NBA 2K Liga — Draft</div>
  <div class="status-txt" id="status-txt">Łączenie...</div>
</div>

<div class="container">
  <div id="main-content">
    <div class="waiting">
      <div style="font-size:3rem">🎯</div>
      <h2>Ładowanie draftu...</h2>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — read from URL params
// ═══════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const WORKER_URL = (params.get('w') || '').replace(/\/+$/, '');
const EVENT_ID   = params.get('event') || '';
const POLL_MS    = 3000;

let evData = null;
let prevTurn = -1;
let timerInterval = null;
let pollInterval  = null;

// ═══════════════════════════════════════════════════
// BEEP SOUNDS
// ═══════════════════════════════════════════════════
let audioCtx = null;
function beep(freq = 440, dur = 0.15, vol = 0.3) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function timerBeep(left) {
  if (left === 30) beep(440, 0.1, 0.2);
  else if (left === 15) beep(550, 0.15, 0.3);
  else if (left === 5)  beep(660, 0.2, 0.4);
  else if (left <= 3 && left > 0) beep(880, 0.1, 0.5);
}

// ═══════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════
function startTimer(endsAt) {
  clearInterval(timerInterval);
  const el = document.getElementById('timer-val');
  if (!el || !endsAt) return;
  timerInterval = setInterval(() => {
    const left = Math.max(0, Math.round((new Date(endsAt) - Date.now()) / 1000));
    const mm = String(Math.floor(left / 60)).padStart(2, '0');
    const ss = String(left % 60).padStart(2, '0');
    el.textContent = mm + ':' + ss;
    el.className = 'timer-val' + (left <= 10 ? ' urgent' : left <= 30 ? ' warning' : '');
    timerBeep(left);
    if (left === 0) clearInterval(timerInterval);
  }, 500);
}

function stopTimer() {
  clearInterval(timerInterval);
  const el = document.getElementById('timer-val');
  if (el) el.textContent = '—';
}

// ═══════════════════════════════════════════════════
// FETCH DATA
// ═══════════════════════════════════════════════════
let _ovrRanking = null; // built once from /data, rebuilt on change

async function fetchData() {
  if (!WORKER_URL) return null;
  try {
    const res = await fetch(WORKER_URL + '/data');
    if (!res.ok) return null;
    const d = await res.json();
    const rec = d.record || d;
    const allEvents = rec.events || [];
    // Build OVR ranking from full record data (matches + method + overrides + psnMap)
    const matches      = rec.matches || [];
    const ovrMethod    = rec.ovrMethod || 'top98';
    const ovrOverrides = rec.ovrOverrides || {};
    const discordPsnMap = rec.discordPsnMap || {};
    if (matches.length) {
      _ovrRanking = { ranking: buildLeagueRanking(matches, ovrMethod, ovrOverrides), discordPsnMap };
    }
    return allEvents.find(e => e.id === EVENT_ID) || null;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════
// OVR ENGINE (ported from index.html)
// ═══════════════════════════════════════════════════
function gradeToNum(g) {
  const map = {'A+':13,'A':12,'A-':11,'B+':10,'B':9,'B-':8,'C+':7,'C':6,'C-':5,'D+':4,'D':3,'D-':2,'F':1};
  return map[(g||'').toUpperCase()] || 0;
}
function calcPER(p) {
  const gp = Math.max(p.gp,1);
  return Math.round(((p.pts+p.reb+p.ast+p.stl+p.blk-(p.fga-p.fgm)-(p.fta-p.ftm)-p.to)/gp)*10)/10;
}
function calcCompositeScore(p) {
  const gp = Math.max(p.gp,1), mat = gp/(gp+5);
  return (Math.min(p.pts/gp/50,1)*100*0.25 + Math.min(p.stl/gp/4,1)*100*0.20 +
          Math.min(p.blk/gp/3,1)*100*0.18  + Math.min(p.reb/gp/20,1)*100*0.15 +
          Math.min(p.ast/gp/15,1)*100*0.12  + (p.gradeSum/gp)/13*100*0.10) * mat;
}
const _dsPosW = {
  PG:{cs:[0.30,0.20,0.10,0.10,0.20,0.10]}, SG:{cs:[0.28,0.22,0.12,0.10,0.18,0.10]},
  SF:{cs:[0.22,0.22,0.18,0.18,0.10,0.10]}, PF:{cs:[0.17,0.18,0.25,0.22,0.08,0.10]},
  C: {cs:[0.13,0.14,0.30,0.28,0.05,0.10]},
};
function buildLeagueRanking(matches, method, ovrOverrides) {
  const m = method || 'top98';
  const statsMap = {};
  matches.forEach(match => {
    [...(match.team1?.players||[]),...(match.team2?.players||[])].forEach(pl => {
      if (!pl.name) return;
      const pos = pl.pos || null;
      const key = pos ? `${pl.name}\x00${pos}` : pl.name;
      if (!statsMap[key]) statsMap[key] = {name:pl.name,pos:pos||'—',pts:0,reb:0,ast:0,stl:0,blk:0,to:0,gs:0,gc:0,gp:0,fgm:0,fga:0,ftm:0,fta:0};
      const s = statsMap[key];
      s.pts+=pl.pts||0; s.reb+=pl.reb||0; s.ast+=pl.ast||0;
      s.stl+=pl.stl||0; s.blk+=pl.blk||0; s.to+=pl.to||0;
      s.fgm+=pl.fgm||0; s.fga+=pl.fga||0; s.ftm+=pl.ftm||0; s.fta+=pl.fta||0;
      s.gs+=gradeToNum(pl.grade||'B'); s.gc++; s.gp++;
    });
  });
  // Scal wpisy bez pozycji z pozycyjnymi
  Object.keys(statsMap).forEach(key => {
    if (key.includes('\x00')) return;
    const noPos = statsMap[key];
    const posKeys = Object.keys(statsMap).filter(k => k.startsWith(noPos.name+'\x00'));
    if (!posKeys.length) return;
    const mainKey = posKeys.sort((a,b) => statsMap[b].gp-statsMap[a].gp)[0];
    const main = statsMap[mainKey];
    main.pts+=noPos.pts; main.reb+=noPos.reb; main.ast+=noPos.ast;
    main.stl+=noPos.stl; main.blk+=noPos.blk; main.to+=noPos.to;
    main.fgm+=noPos.fgm; main.fga+=noPos.fga; main.ftm+=noPos.ftm; main.fta+=noPos.fta;
    main.gs+=noPos.gs; main.gc+=noPos.gc; main.gp+=noPos.gp;
    delete statsMap[key];
  });
  const players = Object.values(statsMap).map(s => {
    const {gp,pos,name} = s;
    const ppg=+(s.pts/gp).toFixed(1), rpg=+(s.reb/gp).toFixed(1), apg=+(s.ast/gp).toFixed(1);
    const spg=+(s.stl/gp).toFixed(1), bpg=+(s.blk/gp).toFixed(1);
    const tot = {gp,pts:s.pts,reb:s.reb,ast:s.ast,stl:s.stl,blk:s.blk,to:s.to,fgm:s.fgm,fga:s.fga,ftm:s.ftm,fta:s.fta,gradeSum:s.gs};
    const per = +calcPER(tot).toFixed(1);
    let cs;
    if (m==='positional') {
      const w=_dsPosW[pos]||_dsPosW.SF;
      cs=+((Math.min(ppg/50,1)*100)*w.cs[0]+(Math.min(spg/3,1)*100)*w.cs[1]+
           (Math.min(bpg/3,1)*100)*w.cs[2]+(Math.min(rpg/20,1)*100)*w.cs[3]+
           (Math.min(apg/15,1)*100)*w.cs[4]+(s.gs/gp)*w.cs[5]).toFixed(1);
    } else if (m==='classic') {
      cs=+calcCompositeScore(tot).toFixed(1);
    } else {
      const mat=gp/(gp+5);
      cs=+(((Math.min(ppg/50,1)*100)*0.25+(Math.min(spg/4,1)*100)*0.20+
            (Math.min(bpg/3,1)*100)*0.18+(Math.min(rpg/20,1)*100)*0.15+
            (Math.min(apg/15,1)*100)*0.12)*mat).toFixed(1);
    }
    return {name,pos,gp,ppg,rpg,apg,spg,bpg,per,cs};
  });
  if (m==='top98') {
    const byPos={};
    players.forEach(p=>{if(!byPos[p.pos])byPos[p.pos]=[];byPos[p.pos].push(p);});
    const comp=p=>(p.per*0.6+p.cs*0.4)*(0.5+0.5*p.gp/(p.gp+5));
    return players.map(p=>{
      const grp=byPos[p.pos]||[p];
      const maxC=Math.max(...grp.map(comp),0.01);
      const calcOvr=Math.max(40,Math.min(98,Math.round(40+comp(p)/maxC*58)));
      return {...p,ovr:(ovrOverrides||{})[p.name]??calcOvr};
    }).sort((a,b)=>b.ovr-a.ovr);
  }
  const pct=(arr,val)=>arr.length<=1?50:arr.filter(v=>v<val).length/(arr.length-1)*100;
  const sP=players.map(p=>p.per).sort((a,b)=>a-b);
  const sC=players.map(p=>p.cs).sort((a,b)=>a-b);
  const sG=players.map(p=>p.ppg).sort((a,b)=>a-b);
  return players.map(p=>{
    const gpBonus=Math.min(p.gp*2,10);
    const raw=pct(sP,p.per)*0.45+pct(sC,p.cs)*0.35+pct(sG,p.ppg)*0.15+gpBonus*0.05;
    const calcOvr=Math.max(40,Math.min(99,Math.round(raw*0.59+40)));
    return {...p,ovr:(ovrOverrides||{})[p.name]??calcOvr};
  }).sort((a,b)=>b.ovr-a.ovr);
}
function _fuzzyScore(a,b) {
  const cl=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
  const ca=cl(a),cb=cl(b);
  if(!ca||!cb) return 0;
  if(ca===cb) return 1;
  if(cb.startsWith(ca)||ca.startsWith(cb)) return 0.9;
  if(cb.includes(ca)||ca.includes(cb)) return 0.8;
  const bg=s=>{const r=new Set();for(let i=0;i<s.length-1;i++)r.add(s.slice(i,i+2));return r;};
  const ba=bg(ca),bb=bg(cb);
  if(!ba.size||!bb.size) return 0;
  return (2*[...ba].filter(g=>bb.has(g)).length)/(ba.size+bb.size);
}
function resolveOvr(player) {
  // If OVR already stored on player (new drafts), use it directly
  if (player.ovr) return player.ovr;
  if (!_ovrRanking) return null;
  const {ranking, discordPsnMap} = _ovrRanking;
  // Build PSN name → OVR map (first = highest for multi-pos players)
  const rankMap = {};
  ranking.forEach(r => { if (!(r.name in rankMap)) rankMap[r.name] = r.ovr; });
  const names = Object.keys(rankMap);
  // 1. discordPsnMap lookup
  const psnName = discordPsnMap[player.discordTag] || discordPsnMap[player.name];
  if (psnName && rankMap[psnName] !== undefined) return rankMap[psnName];
  // 2. Exact case-insensitive
  const exact = names.find(n => n.toLowerCase() === (player.name||'').toLowerCase());
  if (exact) return rankMap[exact];
  // 3. Fuzzy
  let best=null, bestS=0;
  for (const n of names) { const s=_fuzzyScore(player.name||'',n); if(s>bestS){bestS=s;best=n;} }
  if (bestS>=0.55 && best) return rankMap[best];
  return null;
}

// ═══════════════════════════════════════════════════
// POS BADGE + OVR BADGE
// ═══════════════════════════════════════════════════
function posBadge(pos) {
  const cls = { PG:'pos-pg', SG:'pos-sg', SF:'pos-sf', LCK:'pos-lck', PF:'pos-pf', C:'pos-c' }[pos] || 'pos-flex';
  return `<span class="pos-badge ${cls}">${pos}</span>`;
}

function ovrColor(ovr) {
  if (ovr >= 90) return '#4ade80';
  if (ovr >= 80) return '#a3e635';
  if (ovr >= 70) return '#facc15';
  if (ovr >= 60) return '#fb923c';
  return '#f87171';
}

function ovrBadge(ovr) {
  if (!ovr) return '';
  return `<span style="background:${ovrColor(ovr)};color:rgba(0,0,0,.8);border-radius:4px;padding:.1rem .3rem;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;flex-shrink:0">${ovr}</span>`;
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(ev) {
  const status = ev.status;
  const isDone = status !== 'draft';
  const turn   = ev.draftTurn || 0;
  const order  = ev.draftOrder || [];
  const teams  = ev.teams || [];
  const pool   = ev.draftPool || [];
  const picks  = [];  // we rebuild from teams
  // collect all picked players from teams
  teams.forEach(t => {
    (t.players || []).forEach((p, i) => {
      if (p.id !== t.captain?.id) picks.push({ player: p, team: t, idx: i });
    });
  });

  const currentTeamIdx = isDone ? -1 : order[turn];
  const currentTeam    = isDone ? null : teams[currentTeamIdx];
  const lastPick       = ev.lastPick || null;
  const isNewTurn      = turn !== prevTurn;

  // Update topbar
  document.getElementById('draft-title').textContent = '🎯 ' + (ev.title || 'Draft');
  document.getElementById('status-txt').textContent = isDone ? 'ZAKOŃCZONY' : 'LIVE';
  document.getElementById('live-dot').style.background = isDone ? 'var(--muted)' : 'var(--green)';
  document.getElementById('live-dot').style.animation = isDone ? 'none' : 'pulse 1.4s infinite';

  // Build OTC + timer + last pick + board
  let html = '';

  if (isDone) {
    html += `<div class="done-banner">
      <div style="font-size:3rem;margin-bottom:.5rem">🏆</div>
      <h2>DRAFT ZAKOŃCZONY!</h2>
      <div style="color:var(--muted);margin-top:.5rem;font-size:.9rem">Wszystkie drafty zostały wykonane</div>
    </div>`;
    stopTimer();
  } else if (currentTeam) {
    const logoHtml = currentTeam.logoB64
      ? `<img src="${currentTeam.logoB64}">`
      : (currentTeam.name || '?')[0];

    html += `<div class="otc-bar">
      <div class="otc-logo">${logoHtml}</div>
      <div>
        <div class="otc-label">On the Clock</div>
        <div class="otc-team">${currentTeam.name || '—'}</div>
        <div class="otc-pick">Runda ${getRound(turn, order, teams)} · Pick #${turn + 1} z ${order.length}</div>
      </div>
      ${lastPick ? `<div class="last-pick-badge" style="${isNewTurn ? 'animation:slideIn .4s ease' : ''}">
        <div class="last-pick-label">Ostatni pick</div>
        <div class="last-pick-name">${lastPick.playerName || '—'}</div>
        <div class="last-pick-team">${lastPick.teamName || ''} · Pick #${lastPick.pickNum || ''}</div>
      </div>` : ''}
      <div class="timer-wrap">
        <div class="timer-label">Czas</div>
        <div class="timer-val" id="timer-val">—</div>
      </div>
    </div>`;
  }

  // Ticker of all picks so far
  const allPicked = [];
  teams.forEach(t => {
    (t.players || []).forEach(p => {
      if (p.id !== t.captain?.id) allPicked.push({ name: p.name, team: t.name });
    });
  });
  if (allPicked.length) {
    const items = [...allPicked, ...allPicked].map((p, i) =>
      `<span class="ticker-item"><span class="pick-n">#${(i % allPicked.length) + 1}</span> <span class="pick-player">${p.name}</span> → <span class="pick-team">${p.team}</span></span>`
    ).join('');
    html += `<div class="ticker-bar"><div class="ticker-inner">${items}</div></div>`;
  }

  // Board grid
  const cols = Math.min(teams.length, 4);
  html += `<div class="board-grid" style="grid-template-columns:repeat(${cols},1fr)">`;

  teams.forEach((t, ti) => {
    const isOtc = !isDone && ti === currentTeamIdx;
    const teamPicks = (t.players || []).filter(p => p.id !== t.captain?.id);
    const perTeam = (ev.draftOrder || []).length / teams.length;

    const logoHtml = t.logoB64
      ? `<img src="${t.logoB64}">`
      : (t.name || '?')[0];

    html += `<div class="team-col ${isOtc ? 'otc' : ''}">
      <div class="team-col-header">
        <div class="team-logo-sm">${logoHtml}</div>
        <div style="flex:1;min-width:0">
          <div class="team-col-name">${t.name}</div>
          <div class="team-col-gm">${t.captain?.name || '—'}</div>
        </div>
        ${isOtc ? '<span class="otc-badge">⏰ ON CLOCK</span>' : ''}
      </div>`;

    // Captain slot
    html += `<div class="pick-slot">
      ${posBadge('★')}
      <div class="pick-name" style="color:var(--gold)">${t.captain?.name || '—'}</div>
      ${ovrBadge(resolveOvr(t.captain || {}))}
      <span class="pick-num" style="color:var(--gold)">kpt</span>
    </div>`;

    // Picked players
    teamPicks.forEach((p, i) => {
      const posArr = p.positions || [];
      html += `<div class="pick-slot new-pick">
        ${posBadge((i + 1).toString())}
        <div class="pick-name">${p.name}</div>
        ${posArr.length ? `<span class="pick-positions">${posArr.join('·')}</span>` : ''}
        ${ovrBadge(resolveOvr(p))}
        <span class="pick-num">#${i + 1}</span>
      </div>`;
    });

    // Empty slots
    const emptyCount = Math.max(0, Math.floor(perTeam) - teamPicks.length);
    for (let i = 0; i < emptyCount; i++) {
      html += `<div class="pick-slot empty">
        ${posBadge('—')}
        <div class="pick-name" style="color:var(--muted)">—</div>
      </div>`;
    }

    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById('main-content').innerHTML = html;

  // Start timer if changed
  if (isNewTurn && ev.timerEnd && !isDone) {
    startTimer(ev.timerEnd);
  } else if (isDone) {
    stopTimer();
  }

  prevTurn = turn;
}

function getRound(turn, order, teams) {
  if (!teams.length) return 1;
  return Math.floor(turn / teams.length) + 1;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
  if (!WORKER_URL || !EVENT_ID) {
    document.getElementById('main-content').innerHTML = `
      <div class="waiting">
        <div style="font-size:3rem">⚠️</div>
        <h2>Brak parametrów</h2>
        <p style="color:var(--muted);text-align:center">Link musi zawierać parametry <code>?w=WORKER_URL&event=EVENT_ID</code><br>Skopiuj link z przycisku 🔗 w panelu draftu.</p>
      </div>`;
    return;
  }

  const ev = await fetchData();
  if (ev) { evData = ev; render(ev); }
  else {
    document.getElementById('status-txt').textContent = 'Oczekiwanie na draft...';
  }

  pollInterval = setInterval(async () => {
    const fresh = await fetchData();
    if (!fresh) return;
    const changed = !evData
      || fresh.draftTurn !== evData.draftTurn
      || fresh.status    !== evData.status
      || fresh.timerEnd  !== evData.timerEnd;
    evData = fresh;
    if (changed) render(fresh);
  }, POLL_MS);
}

init();
</script>
</body>
</html>
